<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomad - Modification Client</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #0d1117 25%, #0a1628 50%, #0d1117 75%, #0a0a0f 100%);
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.8),
                         0 0 20px rgba(0, 212, 255, 0.6),
                         0 0 30px rgba(0, 212, 255, 0.4),
                         0 0 40px rgba(0, 212, 255, 0.2);
            letter-spacing: 4px;
            margin-bottom: 80px;
        }

        .about-section {
            margin-bottom: 60px;
            max-width: 800px;
        }

        .about-section h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 600;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .about-section p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #b8c5d6;
            font-weight: 300;
        }

        .download-button {
            display: inline-block;
            padding: 18px 50px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: #0a0a0f;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5),
                        0 0 40px rgba(0, 212, 255, 0.3),
                        0 0 60px rgba(0, 212, 255, 0.1);
            transition: all 0.3s ease;
            margin-bottom: 60px;
        }

        .download-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.7),
                        0 0 50px rgba(0, 212, 255, 0.5),
                        0 0 70px rgba(0, 212, 255, 0.3);
            background: linear-gradient(135deg, #00e5ff 0%, #00b8e6 100%);
        }

        .download-button:active {
            transform: translateY(-1px);
        }

        .showcase-section {
            margin-top: 60px;
        }

        .showcase-section h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 600;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-align: center;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3),
                        0 0 60px rgba(0, 212, 255, 0.1);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            .logo {
                font-size: 2.2rem;
                margin-bottom: 50px;
                letter-spacing: 2px;
            }

            .about-section h2 {
                font-size: 1.5rem;
            }

            .about-section p {
                font-size: 1rem;
            }

            .download-button {
                padding: 15px 40px;
                font-size: 1rem;
                width: 100%;
                text-align: center;
            }

            .showcase-section h2 {
                font-size: 1.5rem;
            }

            .video-container {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 1.8rem;
                margin-bottom: 40px;
            }

            .about-section h2 {
                font-size: 1.3rem;
            }

            .download-button {
                padding: 12px 30px;
                font-size: 0.9rem;
            }
        }

        /* Subtle animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(0, 100, 150, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">NOMAD</div>
        
        <div class="about-section">
            <h2>O nas</h2>
            <p>Nomad to nowoczesny klient modyfikacji stworzony z myślą o wydajności, stabilności i wygodzie użytkownika. Naszym celem jest dostarczanie regularnych aktualizacji, intuicyjnego interfejsu oraz najlepszych doświadczeń dla społeczności.</p>
        </div>

        <a href="https://drive.google.com/your-link-here" class="download-button" target="_blank" rel="noopener noreferrer">Download</a>

        <div class="showcase-section">
            <h2>Showcase</h2>
            <div class="video-container">
                <iframe 
                    src="https://www.youtube.com/embed/your-video-id" 
                    title="Nomad Showcase" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>
    </div>
</body>
</html>
